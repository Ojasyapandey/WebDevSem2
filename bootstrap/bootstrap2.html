<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: lightgray;
    }
    .product-card img {
      height: 180px;
      object-fit: contain;
    }
    .badge-new {
      background-color: green;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .badge-sale {
      background-color: red;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <!-- navbar -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="#">TechStore</a>
    <div class="d-flex gap-3">
      <a href="#" class="text-white text-decoration-none">Home</a>
      <a href="#" class="text-white text-decoration-none">Products</a>
      <a href="#" class="text-white text-decoration-none">About</a>
      <a href="#" class="text-white text-decoration-none">Contact</a>
    </div>
  </nav>

  <!-- product cards -->
  <div class="container my-5">
    <div class="row g-4 justify-content-center">

      <!-- Laptop -->
      <div class="col-md-4">
        <div class="card product-card p-3 shadow-sm">
          <img src="https://laptopmedia.com/wp-content/uploads/2025/01/2-21-e1736327153544.jpg" class="card-img-top" alt="Laptop"/>
          <div class="card-body px-0 pb-0">
            <h5 class="card-title fw-bold">Laptop</h5>
            <p class="text-muted mb-2">High performance laptop</p>
            <p class="mb-2">₹50,000 <span class="badge-new">New</span></p>
            <button class="btn btn-primary">View Details</button>
          </div>
        </div>
      </div>

      <!-- mobile -->
      <div class="col-md-4">
        <div class="card product-card p-3 shadow-sm">
          <img src="https://images.samsung.com/uk/smartphones/galaxy-z-fold5/buy/02-Carousel/Exclusive/06-Hero/product-kv_mo.jpg" class="card-img-top" alt="Mobile"/>
          <div class="card-body px-0 pb-0">
            <h5 class="card-title fw-bold">Mobile</h5>
            <p class="text-muted mb-2">Latest smartphone</p>
            <p class="mb-2">₹30,000 <span class="badge-sale">Sale</span></p>
            <button class="btn btn-primary">View Details</button>
          </div>
        </div>
      </div>

      <!-- headphones -->
      <div class="col-md-4">
        <div class="card product-card p-3 shadow-sm">
          <img src="https://audioxpress.com/assets/upload/images/1/20180329124129_Marshall-midANC-FrontWeb.jpg" class="card-img-top" alt="Headphones"/>
          <div class="card-body px-0 pb-0">
            <h5 class="card-title fw-bold">Headphones</h5>
            <p class="text-muted mb-2">Noise cancelling</p>
            <p class="mb-2">₹5,000 <span class="badge-new">New</span></p>
            <button class="btn btn-primary">View Details</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- footer -->
  <footer class="bg-dark text-white text-center py-3 mt-auto">
    © 2026 TechStore | Follow us on social media
  </footer>

</body>
</html>
