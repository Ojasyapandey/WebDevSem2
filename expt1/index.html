<!DOCTYPE html>
<html>
<head>
<title>Result Calculator</title>
</head>

<body>

<h2>Result Calculator</h2>

<button onclick="calculate()">Calculate Result</button>

<script>

function calculate(){

let n = Number(prompt("Enter number of subjects"));

let total = 0;

for(let i = 1; i <= n; i++){

let marks = parseFloat(prompt("Enter marks of subject " + i));

total = total + marks;

}

let percentage = total / n;

alert("Total Marks = " + total);
alert("Percentage = " + percentage + "%");

if(percentage >= 40){
alert("Result : PASS");
}
else{
alert("Result : FAIL");
}

}

</script>

</body>
</html>
